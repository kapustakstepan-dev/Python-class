<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern File Reader</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            transition: transform 0.3s ease;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
        }

        .upload-section {
            border: 2px dashed #cbd5e0;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .upload-section:hover {
            border-color: var(--primary-color);
        }

        input[type="file"] {
            margin-bottom: 15px;
            display: block;
            width: 100%;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: scale(0.98);
        }

        .result-container {
            margin-top: 30px;
        }

        .result-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
            color: #2d3748;
            line-height: 1.5;
        }

        .label {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            color: #4a5568;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 Читач файлів</h2>
    
    <form method="POST" enctype="multipart/form-data">
        <div class="upload-section">
            <input type="file" name="file" accept=".txt" required id="file-upload">
            <label for="file-upload" class="label">Оберіть текстовий файл (.txt)</label>
        </div>
        <button type="submit">Відкрити файл</button>
    </form>

    {% if content %}
    <div class="result-container">
        <span class="label">Вміст файлу:</span>
        <div class="result-box">{{ content }}</div>
    </div>
    {% endif %}
</div>

</body>
</html>
