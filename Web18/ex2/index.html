<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 8px; margin-bottom: 10px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <form method="POST">
            <input type="text" name="text_to_encode" placeholder="Текст..." required><br>
            <button type="submit">OK</button>
        </form>
        {% if qr_url %}
            <div style="margin-top: 20px;">
                <img src="{{ qr_url }}">
                <p>{{ original_text }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
